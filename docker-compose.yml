name: tabario-video-compositor

services:
  tabario-video-compositor:
    build: .
    container_name: tabario-video-compositor
    ports:
      - "9312:9312"
    volumes:
      - "${DATA_SHARED_PATH:-/mnt/tp-share/n8n-shared}:/data/shared"
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=9312
      - DATA_SHARED_BASE=/data/shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9312/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tabario

networks:
  tabario:
    external: true
    name: tabario
